<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>할 일 목록</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <div class="header-content">
      <svg class="title-icon" width="36" height="36" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h1>할 일 목록</h1>
    </div>
  </header>

  <main>
    <section class="input-area">
      <form id="todo-form">
        <input
          type="text"
          id="todo-input"
          placeholder="새 할 일을 입력하세요"
          autocomplete="off"
        />
        <button type="submit">추가</button>
      </form>
    </section>

    <section class="filter-bar">
      <button class="filter-btn active" data-filter="all">전체</button>
      <button class="filter-btn" data-filter="active">진행중</button>
      <button class="filter-btn" data-filter="completed">완료</button>
    </section>

    <div class="toolbar">
      <span class="stats" id="stats"></span>
      <button class="clear-completed-btn" id="clear-completed-btn">완료 삭제</button>
    </div>

    <ul class="todo-list" id="todo-list"></ul>

    <p class="empty-msg" id="empty-msg">할 일이 없습니다.</p>
  </main>

  <script src="app.js"></script>
</body>
</html>
